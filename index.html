<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
    body {
        background: #1e1e2f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: white;
        font-family: Arial;
    }

    .box {
        background: #2c2c3e;
        padding: 40px;
        border-radius: 10px;
        width: 250px;
        text-align: center;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
    }

    button {
        width: 100%;
        padding: 10px;
        background: green;
        color: white;
        border: none;
    }
    </style>

</head>

<body>

<div class="box">
    <h2>Login</h2>
    <input type="text" id="u" placeholder="Username">
    <input type="password" id="p" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p id="hasil"></p>
</div>

<script>
function login() {
    var u = document.getElementById("u").value;
    var p = document.getElementById("p").value;

    if(u == "admin" && p == "123"){
        document.getElementById("hasil").innerHTML = "Berhasil ✅";
    } else {
        document.getElementById("hasil").innerHTML = "Salah ❌";
    }
}
</script>

</body>
</html>
