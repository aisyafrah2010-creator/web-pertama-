<!DOCTYPE html>
<html>
<head>
    <title>Login Responsive</title>

    <!-- INI PENTING buat HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
    body {
        background: #1e1e2f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: white;
        font-family: Arial;
    }

    .box {
        background: #2c2c3e;
        padding: 30px;
        border-radius: 10px;
        width: 90%;
        max-width: 350px;
        text-align: center;
        box-sizing: border-box;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 5px;
        border: none;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 12px;
        background: green;
        color: white;
        border: none;
        border-radius: 5px;
    }

    </style>

</head>

<body>

<div class="box">
    <h2>Login</h2>
    <input type="text" id="u" placeholder="Username">
    <input type="password" id="p" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p id="hasil"></p>
</div>

<script>
function login() {
    var u = document.getElementById("u").value;
    var p = document.getElementById("p").value;

    if(u == "admin" && p == "123"){
        document.getElementById("hasil").innerHTML = "Berhasil ✅";
    } else {
        document.getElementById("hasil").innerHTML = "Salah ❌";
    }
}
</script>

</body>
</html>
