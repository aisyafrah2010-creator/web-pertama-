<!DOCTYPE html>
<html>
<head>
    <title>Login Responsive</title>

    <!-- WAJIB buat HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
    body {
        background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial;
        color: white;
    }

    .box {
        background: #2c2c3e;
        padding: 40px;
        border-radius: 15px;
        width: 350px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4CAF50;
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #45a049;
    }

    /* 🔥 MEDIA QUERY (HP) */
    @media (max-width: 600px) {
        .box {
            width: 90%;
            padding: 25px;
        }

        h2 {
            font-size: 20px;
        }

        input, button {
            padding: 10px;
        }
    }

    /* 🔥 MEDIA QUERY (LAYAR BESAR) */
    @media (min-width: 1000px) {
        .box {
            width: 400px;
        }
    }

    </style>

</head>

<body>

<div class="box">
    <h2>Login</h2>
    <input type="text" id="u" placeholder="Username">
    <input type="password" id="p" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p id="hasil"></p>
</div>

<script>
function login() {
    var u = document.getElementById("u").value;
    var p = document.getElementById("p").value;

    if(u == "admin" && p == "123"){
        document.getElementById("hasil").innerHTML = "Berhasil ✅";
    } else {
        document.getElementById("hasil").innerHTML = "Salah ❌";
    }
}
</script>

</body>
</html>
