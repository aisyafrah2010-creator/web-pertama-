<!DOCTYPE html>
<html>
<head>
    <title>Login Sederhana</title>
    <style>
        body {
            font-family: Arial;
            background: #1e1e2f;
            color: white;
            text-align: center;
        }
        .login-box {
            margin-top: 100px;
            padding: 20px;
            background: #2c2c3e;
            display: inline-block;
            border-radius: 10px;
        }
        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Masuk</button>
        <p id="hasil"></p>
    </div>

    <script>
        function login() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;

            if(user === "admin" && pass === "123") {
                document.getElementById("hasil").innerHTML = "Login Berhasil ✅";
            } else {
                document.getElementById("hasil").innerHTML = "Username / Password Salah ❌";
            }
        }
    </script>

</body>
</html>
